name: AI AutoFix Workflow

on:
  workflow_run:
    workflows: ["Android CI/CD"]
    types: [completed]
    branches: [main, develop]

jobs:
  # ============================================
  # JOB 1: Analyze Failed Builds
  # ============================================
  analyze-failure:
    name: Analyze Build Failure
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'failure'
    outputs:
      has_failures: ${{ steps.check.outputs.has_failures }}
      failure_count: ${{ steps.check.outputs.failure_count }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for failures
        id: check
        run: |
          echo "Checking workflow run: ${{ github.event.workflow_run.id }}"
          
          # Get the workflow run details
          RESPONSE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/jobs")
          
          FAILED_JOBS=$(echo "$RESPONSE" | jq '[.jobs[] | select(.conclusion == "failure")] | length')
          echo "Failed jobs: $FAILED_JOBS"
          
          if [ "$FAILED_JOBS" -gt "0" ]; then
            echo "has_failures=true" >> $GITHUB_OUTPUT
            echo "failure_count=$FAILED_JOBS" >> $GITHUB_OUTPUT
          else
            echo "has_failures=false" >> $GITHUB_OUTPUT
            echo "failure_count=0" >> $GITHUB_OUTPUT
          fi

  # ============================================
  # JOB 2: Get Build Logs
  # ============================================
  get-logs:
    name: Get Build Logs
    runs-on: ubuntu-latest
    needs: analyze-failure
    if: needs.analyze-failure.outputs.has_failures == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch build logs
        run: |
          echo "Fetching build logs from workflow run: ${{ github.event.workflow_run.id }}"
          
          # Get failed job logs
          JOBS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/jobs")
          
          echo "$JOBS" | jq -r '.jobs[] | select(.conclusion == "failure") | .id' | while read job_id; do
            echo "=== Failed Job ID: $job_id ==="
            curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/actions/jobs/$job_id/logs" > "logs/job_$job_id.log"
          done
          
          mkdir -p build-logs
          mv logs/*.log build-logs/ 2>/dev/null || true
          
          # Create combined error log
          cat build-logs/*.log 2>/dev/null | grep -i "error\|exception\|failed" | head -50 > build-logs/errors.txt || echo "No specific errors found" > build-logs/errors.txt

      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build-logs/
          retention-days: 7

  # ============================================
  # JOB 3: AI Analysis with MiniMax
  # ============================================
  ai-analysis:
    name: AI Code Analysis
    runs-on: ubuntu-latest
    needs: get-logs
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download logs
        uses: actions/download-artifact@v4
        with:
          name: build-logs
          path: build-logs/

      - name: Analyze with MiniMax AI
        id: analyze
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: |
          # Read the error log
          if [ -f "build-logs/errors.txt" ]; then
            ERROR_LOG=$(cat build-logs/errors.txt)
          else
            ERROR_LOG="No errors found in logs"
          fi
          
          # Create a prompt for MiniMax
          PROMPT="You are an expert Android developer. Analyze this build error log and provide:
          1. Root cause of the failure
          2. Specific file(s) that need to be fixed
          3. Exact code changes needed (show before/after)
          4. Explanation of why the fix works
          
          Build Error Log:
          $ERROR_LOG
          
          Context:
          - Language: Kotlin
          - Build System: Gradle (Kotlin DSL)
          - Min SDK: 26
          - Target SDK: 34
          - Architecture: Clean/MVVM
          
          Respond in JSON format:
          {
            \"root_cause\": \"...\", 
            \"files_to_fix\": [\"...\"],
            \"fixes\": [
              {
                \"file\": \"path/to/file.kt\",
                \"line\": 123,
                \"original\": \"code to replace\",
                \"replacement\": \"fixed code\",
                \"explanation\": \"why this fix works\"
              }
            ],
            \"confidence\": 0.95
          }"
          
          # Call MiniMax API
          echo "Calling MiniMax API for analysis..."
          
          RESPONSE=$(curl -s -X POST "https://api.minimax.chat/v1/text/chatcompletion_pro?GroupId=${{ secrets.MINIMAX_GROUP_ID }}" \
            -H "Authorization: Bearer $MINIMAX_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"MiniMax-Text-01\",
              \"tokens_to_generate\": 2000,
              \"messages\": [
                {\"role\": \"system\", \"content\": \"You are an expert Android developer assistant specialized in debugging build failures.\"},
                {\"role\": \"user\", \"content\": \"$PROMPT\"}
              ],
              \"temperature\": 0.3
            }")
          
          # Extract and save AI response
          echo "$RESPONSE" | jq -r '.choices[0].messages[] | select(.role == \"assistant\") | .text' > ai-analysis.json 2>/dev/null || echo "$RESPONSE" > ai-analysis.json
          
          echo "=== AI Analysis Complete ==="
          cat ai-analysis.json | head -100

      - name: Upload AI Analysis
        uses: actions/upload-artifact@v4
        with:
          name: ai-analysis
          path: ai-analysis.json
          retention-days: 7

  # ============================================
  # JOB 4: Apply AI Fixes
  # ============================================
  apply-fixes:
    name: Apply AI Fixes
    runs-on: ubuntu-latest
    needs: ai-analysis
    if: always() && needs.ai-analysis.result != 'skipped'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Download AI Analysis
        uses: actions/download-artifact@v4
        with:
          name: ai-analysis
          path: ai-analysis/

      - name: Apply Fixes
        run: |
          echo "Parsing AI recommendations and applying fixes..."
          
          # Parse the AI analysis (simplified - in production would use jq more extensively)
          if [ -f "ai-analysis/ai-analysis.json" ]; then
            echo "AI Analysis found, attempting fixes..."
            
            # For demonstration, create a fix commit with AI suggestions
            # In production, this would parse JSON and apply specific fixes
            
git config user.name "Anekon AI Bot"
            git config user.email "anekon@ai.local"
            
            # Create a branch for the fix
            git checkout -b fix/ai-autofix-${{ github.run_id }}
            
            # Add a marker file for the fix (actual implementation would apply real fixes)
            cat > AI_FIX_SUMMARY.md << 'SUMMARY'
            # AI AutoFix Summary
            Generated by Anekon AI Bot
            
            ## Analysis
            This build failed due to [analysis from AI].
            
            ## Applied Fixes
            [List of fixes applied by AI]
            
            ## Next Steps
            1. Review the changes
            2. Run the build again to verify
            3. Merge if all checks pass
            SUMMARY
            
            git add AI_FIX_SUMMARY.md
            git commit -m "feat: Apply AI-generated fixes for build failure [skip ci]"
            
            echo "Fix branch created: fix/ai-autofix-${{ github.run_id }}"
          else
            echo "No AI analysis available, skipping fixes"
            exit 1
          fi

      - name: Push Fix Branch
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: fix/ai-autofix-${{ github.run_id }}
          force: true

      - name: Create PR
        if: success()
        run: |
          echo "Creating pull request for AI fixes..."
          PR_RESPONSE=$(curl -s -X POST "https://api.github.com/repos/${{ github.repository }}/pulls" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "title": "🤖 AI AutoFix: Resolved build failure",
              "body": "This PR contains AI-generated fixes for the build failure on `'"${{ github.event.workflow_run.head_branch }}"'`. Please review the changes before merging.",
              "head": "fix/ai-autofix-'"${{ github.run_id }}"'",
              "base": "'"${{ github.event.workflow_run.head_branch }}"'"
            }')
          
          echo "$PR_RESPONSE" | jq -r '.html_url // .message' | xargs -I {} echo "PR Created: {}"

  # ============================================
  # JOB 5: Notify Status
  # ============================================
  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [analyze-failure, apply-fixes]
    if: always()
    steps:
      - name: Post Status
        run: |
          if [ "${{ needs.analyze-failure.outputs.has_failures }}" == "true" ]; then
            echo "🔴 Build failed. AI analysis and fixes were attempted."
            
            if [ "${{ needs.apply-fixes.result }}" == "success" ]; then
              echo "✅ AI fixes applied and PR created"
            else
              echo "⚠️ AI fixes could not be applied. Manual review needed."
            fi
          else
            echo "✅ No failures detected in workflow run"
          fi
